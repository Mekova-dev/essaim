name: Mekova Découverte
description: "4 angles d'analyse de transcript en parallèle + synthétiseur gaté"
phase: 1
workspace: shared
stagger: { mode: fixed, delay: [0, 0] }
timeout_minutes: 20
metrics: [issues_found, categories_scanned]
compare_mode: false
agents:
  - idPrefix: dec-features
    namePrefix: Angle Features
    preset: mekova-dec-features
    profile: communicant
    count: 1
    launch_delay: 0
  - idPrefix: dec-risques
    namePrefix: Angle Risques
    preset: mekova-dec-risques
    profile: communicant
    count: 1
    launch_delay: 0
  - idPrefix: dec-roi
    namePrefix: Angle ROI
    preset: mekova-dec-roi
    profile: communicant
    count: 1
    launch_delay: 0
  - idPrefix: dec-questions
    namePrefix: Angle Questions
    preset: mekova-dec-questions
    profile: communicant
    count: 1
    launch_delay: 0
  - idPrefix: dec-synth
    namePrefix: Synthétiseur
    preset: mekova-dec-synth
    profile: communicant
    count: 1
    launch_delay: 60
