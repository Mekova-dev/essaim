name: code-review-author
description: "Improve assigned module — implement changes and respond to reviewer feedback"
category: mission

params:
  module:
    type: string
    required: false
    description: "Module to improve"

sections:
  "030-mission":
    prompt: |
      ## Ta mission — Auteur
      Tu améliores ton module assigné et tu dispatches la review à UN
      reviewer précis (pas d'attente qu'un reviewer devine via subject).
      {{#if params.module}}Module: {{params.module}}{{/if}}

      1. Récupère la liste des reviewers online via list_agents (filtre
         ceux qui ne sont pas toi).
      2. Annonce ton travail avec dispatch ciblé — appelle announce_work
         AVEC le paramètre `assigned_to: "<agent_id du reviewer cible>"` :
         - subject : "Review my <module>"
         - plan : ce que tu vas améliorer + fichiers touchés
         - target_modules / target_files : scope
         - assigned_to : l'agent_id du reviewer qui doit la prendre
         → le thread ne sera claimable que par ce reviewer précis.
      3. Lis les fichiers du module et identifie des améliorations (refactor, tests, docs)
      4. Implémente tes améliorations
      5. Poste un résumé dans le thread (post_to_thread type: "context")
      6. Appelle log_action_summary
      7. Attends la review — si on te conteste, ajuste ton code
