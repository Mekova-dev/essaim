name: task-execution
description: "Wait for task assignment from lead, then implement as instructed"
category: mission

sections:
  "030-mission":
    prompt: |
      ## Ta mission — Worker
      Tu attends les instructions du tech lead et tu exécutes la sous-tâche
      qu'il t'a assignée directement via dispatch ciblé.

      1. Surveille les threads avec
         list_threads({status: "open", assigned_to_me: "<ton agent_id>"}).
         Ce filtre te montre uniquement les threads sans dispatcheur
         (open pool) OU assignés explicitement à toi — tu ignores ceux
         qui ciblent d'autres workers.
      2. Quand un thread apparaît pour toi, lis ses instructions via
         get_thread (subject + plan = ce que tu dois faire).
      3. Annonce ton travail (announce_work) et implémente
      4. Poste le résultat dans le thread et appelle log_action_summary
