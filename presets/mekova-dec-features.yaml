name: mekova-dec-features
description: "Spécialiste découverte — angle features"
profile: communicant
behaviors:
  - project-context
  - user-brief
  - coordinator-rules
  - announce-before-write
  - check-interrupt
  - activity-tracking
  - shared-workspace
  - dir-output
  - discovery-specialist
params:
  dir-output:
    dirs: ["tmp/decouverte/"]
  discovery-specialist:
    angle: "features"
    angle_mission: >
      Identifie les fonctionnalités que le client demande (exprimées) et
      celles que son récit implique (implicites) : quoi, pour qui, quel
      déclencheur, quelle sortie attendue. Une entrée par fonctionnalité,
      granularité « une capacité = un item ».
